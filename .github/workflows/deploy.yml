name: Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Jekyll
        run: gem install jekyll kramdown-parser-gfm

      - name: Build site
        run: jekyll build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate OG image
        run: |
          npm init -y --silent
          npm install puppeteer --silent
          node generate-og-image.js

      - name: Generate CV PDF
        run: |
          npx serve _site -p 4000 &
          sleep 3
          node generate-pdf.js
          kill %1 || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
